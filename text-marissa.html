<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{height:100%}
body{
  font-family:'Open Sans',Helvetica,Arial,sans-serif;
  -webkit-font-smoothing:antialiased;
  background:#faf8f5;
  color:#0a2628;
  display:flex;
  flex-direction:column;
  min-height:100vh;
  min-height:100dvh;
  overflow-x:hidden;
}
.tap-link{
  flex:1;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  width:100%;
  text-decoration:none;
  color:inherit;
  padding:40px 24px 48px;
  text-align:center;
  position:relative;
  cursor:pointer;
  user-select:none;
  background:
    radial-gradient(circle at 50% 18%, rgba(13,197,207,.18) 0, transparent 50%),
    radial-gradient(circle at 12% 88%, rgba(22,208,156,.16) 0, transparent 48%),
    radial-gradient(circle at 88% 78%, rgba(124,203,97,.14) 0, transparent 46%),
    #faf8f5;
  overflow:hidden;
  animation:tap-zone-glow 2.4s ease-in-out infinite;
}
@keyframes tap-zone-glow{
  0%,100%{box-shadow:inset 0 0 0 2px rgba(13,197,207,.18),inset 0 0 80px rgba(13,197,207,.06)}
  50%{box-shadow:inset 0 0 0 4px rgba(13,197,207,.32),inset 0 0 120px rgba(13,197,207,.12)}
}
/* Ambient tap ripples scattered around the page */
.ripple{
  position:absolute;
  width:60px;
  height:60px;
  border-radius:50%;
  border:2px solid rgba(13,197,207,.5);
  pointer-events:none;
  z-index:1;
  animation:ripple-out 3s ease-out infinite;
}
.ripple-1{top:14%;left:10%}
.ripple-2{top:66%;right:12%;animation-delay:.6s;border-color:rgba(22,208,156,.5)}
.ripple-3{top:32%;right:8%;animation-delay:1.2s;border-color:rgba(255,79,73,.45)}
.ripple-4{bottom:18%;left:8%;animation-delay:1.8s;border-color:rgba(22,208,156,.5)}
.ripple-5{top:48%;left:50%;transform:translateX(-50%);width:90px;height:90px;animation-delay:2.4s;border-color:rgba(13,197,207,.4)}
@keyframes ripple-out{
  0%{transform:scale(0);opacity:1}
  80%{opacity:.4}
  100%{transform:scale(3);opacity:0}
}
.ripple-5{transform-origin:center}
@keyframes ripple-out-center{
  0%{transform:translateX(-50%) scale(0);opacity:1}
  80%{opacity:.4}
  100%{transform:translateX(-50%) scale(3);opacity:0}
}
.ripple-5{animation-name:ripple-out-center}
/* Tropical leaf decoration */
.leaf-bg{
  position:absolute;
  pointer-events:none;
  opacity:.12;
  filter:blur(2px) saturate(1.4);
}
.leaf-tl{top:-30px;left:-40px;width:160px;transform:rotate(-25deg)}
.leaf-br{bottom:-20px;right:-50px;width:180px;transform:rotate(150deg)}
.tap-link:active .cta-button{
  transform:translateY(4px);
  box-shadow:0 2px 0 #c93b35,0 0 0 0 rgba(255,79,73,0);
}
.event-pill{
  display:inline-flex;
  align-items:center;
  gap:8px;
  padding:8px 16px;
  background:rgba(13,197,207,.12);
  border:1px solid rgba(13,197,207,.5);
  font-size:11px;
  font-weight:800;
  letter-spacing:.14em;
  text-transform:uppercase;
  color:#0a8a92;
  margin-bottom:24px;
  position:relative;
  z-index:2;
}
.event-pill::before{
  content:"";
  width:8px;
  height:8px;
  background:#16d09c;
  border-radius:50%;
  box-shadow:0 0 0 4px rgba(22,208,156,.25);
  animation:dot-pulse 1.8s ease-in-out infinite;
}
@keyframes dot-pulse{
  0%,100%{box-shadow:0 0 0 4px rgba(22,208,156,.25)}
  50%{box-shadow:0 0 0 7px rgba(22,208,156,.1)}
}
.handwritten{
  font-family:'Nanum Pen Script',cursive;
  font-size:clamp(24px,6vw,38px);
  color:#0a8a92;
  margin-bottom:4px;
  display:block;
  line-height:1;
  position:relative;
  z-index:2;
}
.headline{
  font-family:Helvetica,Arial,sans-serif;
  font-weight:900;
  font-size:clamp(44px,11vw,76px);
  line-height:.95;
  margin-bottom:16px;
  letter-spacing:-.025em;
  color:#0a2628;
  display:block;
  position:relative;
  z-index:2;
}
.headline em{
  font-style:normal;
  background:linear-gradient(90deg,#0ad1d9,#16d09c,#7ccb61);
  -webkit-background-clip:text;
  background-clip:text;
  color:transparent;
}
.subhead{
  font-size:clamp(15px,4vw,18px);
  font-weight:500;
  color:#4a5a5e;
  margin-bottom:24px;
  max-width:420px;
  line-height:1.5;
  display:block;
  position:relative;
  z-index:2;
}
.arrow-pointer{
  display:block;
  margin:8px auto 12px;
  position:relative;
  z-index:2;
  animation:arrow-bob 1.4s ease-in-out infinite;
}
@keyframes arrow-bob{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(8px)}
}
.cta-button{
  display:inline-block;
  padding:24px 48px;
  background:#ff4f49;
  color:#fff;
  font-family:Helvetica,Arial,sans-serif;
  font-weight:900;
  font-size:clamp(17px,4.8vw,22px);
  text-transform:uppercase;
  letter-spacing:.08em;
  box-shadow:0 6px 0 #c93b35,0 0 0 0 rgba(255,79,73,.55);
  margin-bottom:14px;
  transition:transform .08s ease,box-shadow .08s ease;
  animation:cta-pulse 2s ease-out infinite;
  position:relative;
  z-index:2;
}
@keyframes cta-pulse{
  0%{box-shadow:0 6px 0 #c93b35,0 0 0 0 rgba(255,79,73,.55)}
  70%{box-shadow:0 6px 0 #c93b35,0 0 0 26px rgba(255,79,73,0)}
  100%{box-shadow:0 6px 0 #c93b35,0 0 0 0 rgba(255,79,73,0)}
}
.cta-note{
  font-size:13px;
  font-weight:600;
  color:#5a6a6e;
  letter-spacing:.04em;
  display:block;
  position:relative;
  z-index:2;
}
.cta-note strong{color:#0a2628;font-weight:800}
.fallback-bar{
  padding:14px 24px;
  background:#ede8e2;
  text-align:center;
  border-top:1px solid rgba(10,38,40,.08);
}
.fallback-bar a{
  font-size:12px;
  color:#5a6a6e;
  text-decoration:none;
  font-style:italic;
  letter-spacing:.02em;
  transition:color .15s ease;
}
.fallback-bar a:hover{color:#0a2628}
@media(max-width:480px){
  .tap-link{padding:28px 20px 36px}
  .event-pill{margin-bottom:18px}
  .leaf-tl{width:120px}
  .leaf-br{width:140px}
}
@media(min-width:769px){
  .tap-link{padding:80px 40px}
}
</style>
